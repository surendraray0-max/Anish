<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Shopping App</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

.container{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.product{
    background:white;
    padding:15px;
    border-radius:10px;
    width:220px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    text-align:center;
}

button{
    background:#007bff;
    color:white;
    border:none;
    padding:10px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.cart{
    margin-top:30px;
    background:white;
    padding:20px;
    border-radius:10px;
    max-width:500px;
    margin-left:auto;
    margin-right:auto;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<h1>🛒 Simple Shopping App</h1>

<div class="container">

    <div class="product">
        <h3>T-Shirt</h3>
        <p>Price: $10</p>
        <button onclick="addToCart('T-Shirt',10)">Add to Cart</button>
    </div>

    <div class="product">
        <h3>Shoes</h3>
        <p>Price: $25</p>
        <button onclick="addToCart('Shoes',25)">Add to Cart</button>
    </div>

    <div class="product">
        <h3>Watch</h3>
        <p>Price: $40</p>
        <button onclick="addToCart('Watch',40)">Add to Cart</button>
    </div>

</div>

<div class="cart">
    <h2>Cart Items</h2>
    <ul id="cartItems"></ul>
    <h3>Total: $<span id="total">0</span></h3>
</div>

<script>
let total = 0;

function addToCart(name, price){
    const cartItems = document.getElementById("cartItems");

    const li = document.createElement("li");
    li.textContent = `${name} - $${price}`;
    cartItems.appendChild(li);

    total += price;
    document.getElementById("total").textContent = total;
}
</script>

</body>
</html>
